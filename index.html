<!doctype html><html lang="ro"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#111827"><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="style.css"><title>Suedeză pentru Români</title></head><body><header><h1>Suedeză pentru Români</h1><small id="versionLabel">Se încarcă…</small></header><nav id="mainNav"><button data-tab="cards" class="active">Carduri</button><button data-tab="vocabulary">Vocabular</button><button data-tab="expressions">Expresii</button><button data-tab="grammar">Gramatică</button><button data-tab="stats">Progres</button><button data-tab="settings">Setări</button></nav><main><section id="tab-cards" class="tab active"><div class="toolbar"><select id="direction"><option value="ro-sv">Română → Suedeză</option><option value="sv-ro">Suedeză → Română</option></select><select id="typeFilter"><option value="all">Toate</option><option value="subst.">Substantive</option><option value="verb">Verbe</option><option value="expresie">Expresii</option></select><select id="levelFilter"><option value="all">Toate nivelurile</option><option>A1</option><option>A2</option><option>B1</option><option>B2</option><option>C1</option><option>C2</option></select><input id="cardSearch" placeholder="Caută…"></div><div class="card" id="flashcard"><div id="cardFront" class="card-face"></div><div id="cardBack" class="card-face hidden"></div></div><div class="controls"><button id="prevBtn" class="secondary">Înapoi</button><button id="flipBtn">Întoarce</button><button id="nextBtn" class="secondary">Următor</button></div><div class="controls"><button data-rate="1" class="bad">Nu știu</button><button data-rate="3" class="warn">Greu</button><button data-rate="5" class="good">Ușor</button><button id="speakBtn" class="secondary">🔊 Ascultă</button><button id="speakSlowBtn" class="secondary">🐢 Lent</button></div><p id="cardMeta" class="muted"></p></section><section id="tab-vocabulary" class="tab"><input id="vocabSearch" placeholder="Caută în vocabular…"><div id="vocabList" class="list"></div></section><section id="tab-expressions" class="tab"><input id="exprSearch" placeholder="Caută expresii…"><div id="exprList" class="list"></div></section><section id="tab-grammar" class="tab"><div id="grammarList" class="list"></div></section><section id="tab-stats" class="tab"><div id="statsPanel"></div></section><section id="tab-settings" class="tab"><h2>Actualizare</h2><p>Aplicația citește automat <code>data.json</code> din același repository.</p><button id="updateBtn">Actualizează baza de date</button><p id="updateStatus" class="muted"></p><h2>Audio</h2><p id="voiceStatus" class="muted"></p><button id="testVoiceBtn" class="secondary">Testează vocea suedeză</button><h2>Date locale</h2><button id="exportProgressBtn" class="secondary">Exportă progresul</button><button id="resetProgressBtn" class="bad">Resetează progresul</button></section></main><script src="app.js"></script></body></html>
